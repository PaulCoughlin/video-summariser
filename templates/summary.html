<article class="bg-ink-900/60 backdrop-blur border border-ink-700 rounded-2xl overflow-hidden shadow-2xl shadow-black/40">
  <a href="{{ watch_url }}" target="_blank" rel="noopener" class="block group relative">
    <img
      src="{{ thumbnail_url }}"
      alt="Video thumbnail"
      class="w-full aspect-video object-cover bg-ink-800"
      onerror="this.onerror=null; this.src='{{ thumbnail_fallback }}'"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition flex items-end justify-end p-4">
      <span class="bg-white/95 text-ink-950 text-sm font-medium px-3 py-1.5 rounded-lg shadow-lg">
        Watch on YouTube ↗
      </span>
    </div>
  </a>
  <div class="p-6 sm:p-8 prose-summary">
    {{ body_html | safe }}
  </div>
  <div class="px-6 sm:px-8 pb-6 text-xs text-slate-500 border-t border-ink-800 pt-4">
    {{ segment_count }} transcript segments · ~{{ approx_tokens }} tokens sent to Claude
  </div>
</article>
